name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"
          dune-cache: true
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- dune test
      - name: jig init scaffolds a valid project from the embedded template
        run: |
          mkdir /tmp/init-check
          cd /tmp/init-check
          "$GITHUB_WORKSPACE/_build/default/bin/main.exe" init
          "$GITHUB_WORKSPACE/_build/default/bin/main.exe" validate bugfix
          "$GITHUB_WORKSPACE/_build/default/bin/main.exe" validate feature-development
          "$GITHUB_WORKSPACE/_build/default/bin/main.exe" list workflows
          # The embedded set must match the template tree exactly.
          mkdir /tmp/tree-check && cp -R "$GITHUB_WORKSPACE"/template/* /tmp/tree-check/
          diff -r /tmp/tree-check /tmp/init-check/.jig
