# The harness jig spawns for every step. Any headless agent CLI works -
# jig appends the step prompt as the final argument. Structured JSON
# output (like claude -p --output-format json) enables cost metering.
# Pick a permission strategy that allows the tools your skills need
# (editing files, running tests) without interactive prompts.
# jig appends the step prompt as the FINAL argument: never end the list
# with a flag that takes multiple values (e.g. --allowedTools), or it
# will swallow the prompt.
# jig owns workspace isolation: deny any harness tool that could relocate
# the run's work (for claude, the worktree tools).
harness:
  - claude
  - -p
  - --output-format
  - json
  - --disallowedTools
  - "EnterWorktree,ExitWorktree"
  - --permission-mode
  - acceptEdits

# Optional: wrap every harness invocation in an OS-level sandbox.
# wrapper:
#   - srt

# Optional: command for `jig attach <run-id>` - reopens a step's recorded
# harness session interactively; {session_id} is replaced from the step
# record.
# attach:
#   - claude
#   - --resume
#   - "{session_id}"

# Optional: the headless twin of attach. After the chat ends on a paused
# run, jig resumes the same session with this command to collect its
# handoff and continue the run.
# attach_headless:
#   - claude
#   - -p
#   - --resume
#   - "{session_id}"
#   - --output-format
#   - json
