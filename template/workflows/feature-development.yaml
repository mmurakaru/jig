name: feature-development
steps:
  - skill: clarify-requirements
    on_fail: escalate
  - retry:
      max_iterations: 3
      on_exhausted: escalate
      steps:
        - skill: implement-feature
        - skill: run-tests
          until: pass
          tier: mechanical
  - skill: capture-evidence
    tier: mechanical
  - skill: open-pr
    tier: mechanical
