name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: jig-macos-arm64
          - os: ubuntu-latest
            artifact: jig-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"
          dune-cache: true
      - run: opam install . --deps-only
      # Scope the build to the binary: test deps are not installed here.
      - run: opam exec -- dune build --profile release bin/main.exe
      - run: cp _build/default/bin/main.exe ${{ matrix.artifact }}
      - name: Pack the starter template
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p stage/.jig
          cp -R template/* stage/.jig/
          tar -czf jig-template.tar.gz -C stage .jig
      - name: Pack the harness skill
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf jig-skill.tar.gz -C skills jig
      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          case "$GITHUB_REF_NAME" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" $prerelease_flag --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" "${{ matrix.artifact }}" --clobber
          for asset in jig-template.tar.gz jig-skill.tar.gz; do
            if [ -f "$asset" ]; then
              gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
            fi
          done
